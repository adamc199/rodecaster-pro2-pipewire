# WirePlumber configuration for RODE RODECaster Pro II
# Renames audio nodes to match Windows naming convention

monitor.alsa.rules = [
  # USB 1 Chat-Out (output to Chat channel)
  {
    matches = [
      {
        node.name = "~alsa_output.usb-R__DE_RODECaster_Pro_II_.*pro-output-0"
      }
    ]
    actions = {
      update-props = {
        node.description = "USB 1 Chat-Out"
        node.nick = "USB 1 Chat-Out"
      }
    }
  },
  # USB 1 Main-In (input from Main mix)
  {
    matches = [
      {
        node.name = "~alsa_output.usb-R__DE_RODECaster_Pro_II_.*pro-output-1"
      }
    ]
    actions = {
      update-props = {
        node.description = "USB 1 Main-In"
        node.nick = "USB 1 Main-In"
      }
    }
  },
  # USB 1 Chat-In (input from Chat channel)
  {
    matches = [
      {
        node.name = "~alsa_input.usb-R__DE_RODECaster_Pro_II_.*pro-input-0"
      }
    ]
    actions = {
      update-props = {
        node.description = "USB 1 Chat-In"
        node.nick = "USB 1 Chat-In"
      }
    }
  },
  # Multitrack - Input (all 16 individual channels)
  {
    matches = [
      {
        node.name = "~alsa_input.usb-R__DE_RODECaster_Pro_II_.*pro-input-1"
      }
    ]
    actions = {
      update-props = {
        node.description = "RODECaster Pro II - Multitrack"
        node.nick = "Multitrack"
      }
    }
  },
  # USB 2 Main-In (device 2 output)
  {
    matches = [
      {
        node.name = "~alsa_output.usb-R__DE_R__DECaster_Pro_II-00.pro-output-0"
      }
    ]
    actions = {
      update-props = {
        node.description = "USB 2 Main-In"
        node.nick = "USB 2 Main-In"
      }
    }
  },
  # USB 2 Main-In (device 2 input)
  {
    matches = [
      {
        node.name = "~alsa_input.usb-R__DE_R__DECaster_Pro_II-00.pro-input-0"
      }
    ]
    actions = {
      update-props = {
        node.description = "USB 2 Main-In"
        node.nick = "USB 2 Main-In"
      }
    }
  }
]
